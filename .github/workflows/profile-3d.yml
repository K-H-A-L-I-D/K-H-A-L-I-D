name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - name: Generate settings with rolling 12-month window
        run: |
          START=$(date -d "1 year ago" +%Y-%m-%d)
          END=$(date +%Y-%m-%d)
          echo "{\"githubUserName\":\"K-H-A-L-I-D\",\"startDate\":\"$START\",\"endDate\":\"$END\"}" > /tmp/settings.json

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}
          USERNAME: K-H-A-L-I-D
          SETTING_JSON: /tmp/settings.json
      - name: Commit & Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A .
          git status
          git diff --staged --quiet || git commit -m "chore: update 3D contribution graph"
          git push

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: K-H-A-L-I-D
          outputs: |
            dist/snake.svg?palette=github-dark
